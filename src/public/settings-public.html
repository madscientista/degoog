<!doctype html>
<html lang="__LANG_ATTR__" __THEME_ATTRS__ __RTL_SUPPORT__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{t:settings-page.meta.description}}" />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest"
      crossorigin="use-credentials"
    />
    <title>{{t:settings-page.meta.title}}</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var r = document.documentElement;
        if (t === "light") r.setAttribute("data-theme", "light");
        else if (t === "dark") r.setAttribute("data-theme", "dark");
        else {
          var m = window.matchMedia("(prefers-color-scheme: dark)");
          r.setAttribute("data-theme", m.matches ? "dark" : "light");
        }
      })();
    </script>
    <link
      rel="preload"
      href="/public/themes/degoog-theme/fonts/google-sans/static/GoogleSans-Medium.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__"
    />
    __THEME_CSS__ __CUSTOM_CSS__
    <script>
      window.__DEGOOG_PUBLIC_INSTANCE__ = true;
    </script>
  </head>
  <body class="settings-page-body settings-page-body--public">
    <div class="settings-page">
      <header class="settings-page-header">
        <a href="/" class="settings-page-back">
          <i class="fa-solid fa-arrow-left fa-xl"></i>
          {{t:settings-page.back}}
        </a>
        <h1 class="settings-page-title">{{t:settings-page.page-title}}</h1>
      </header>

      <main class="settings-page-main">
        <div id="public-settings-content"></div>

        <section class="settings-section">
          <h2 class="settings-section-heading">
            {{t:settings-page.public.engines-heading}}
          </h2>
          <div id="engines-content"></div>
        </section>

        <section
          class="settings-section ext-card degoog-panel degoog-panel--ext-card"
          id="indexer-public-section"
          hidden
        >
          <div class="setting-section-heading-wrapper">
            <h2 class="settings-section-heading">
              {{t:settings-page.indexer.heading}}
            </h2>
            <div class="floating-section-icon">
              <i class="fa-solid fa-database"></i>
            </div>
          </div>
          <p class="settings-desc">{{t:settings-page.indexer.desc}}</p>
          <fieldset class="settings-fieldset">
            <div class="degoog-select-wrap" id="indexer-public-type-wrap" hidden>
              <select id="indexer-public-type" class="degoog-input"></select>
            </div>
            <div class="degoog-action-row degoog-action-row--buttons">
              <button
                type="button"
                class="btn btn--secondary degoog-btn degoog-btn--secondary"
                id="indexer-public-export-btn"
              >
                {{t:settings-page.indexer.export-btn}}
              </button>
            </div>
            <p id="indexer-public-status" class="settings-desc"></p>
          </fieldset>
        </section>
      </main>
    </div>

    <script
      type="module"
      src="/public/settings-page.js?v=__APP_VERSION__"
    ></script>
  </body>
</html>
