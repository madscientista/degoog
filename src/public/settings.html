<!doctype html>
<html lang="__LANG_ATTR__" __THEME_ATTRS__ __RTL_SUPPORT__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{t:settings-page.meta.description}}" />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest"
      crossorigin="use-credentials"
    />
    <title>{{t:settings-page.meta.title}}</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var r = document.documentElement;
        if (t === "light") r.setAttribute("data-theme", "light");
        else if (t === "dark") r.setAttribute("data-theme", "dark");
        else {
          var m = window.matchMedia("(prefers-color-scheme: dark)");
          r.setAttribute("data-theme", m.matches ? "dark" : "light");
        }
      })();
    </script>
    <link
      rel="preload"
      href="/public/themes/degoog-theme/fonts/google-sans/static/GoogleSans-Medium.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__"
    />
    __THEME_CSS__ __CUSTOM_CSS__
  </head>
  <body class="settings-page-body">
    <div class="settings-page">
      <header class="settings-page-header">
        <a href="/" class="settings-page-back">
          <i class="fa-solid fa-arrow-left fa-xl"></i>
          {{t:settings-page.back}}
        </a>
        <h1 class="settings-page-title">{{t:settings-page.page-title}}</h1>
      </header>

      <div class="settings-layout">
        <div class="settings-sidebar">
          <div
            class="settings-nav-search degoog-search-bar degoog-search-bar--square-advanced"
          >
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              type="text"
              id="settings-global-search"
              class="settings-nav-search-input search-input degoog-input"
              placeholder="{{t:settings-page.tab-search.placeholder}}"
              autocomplete="off"
            />
          </div>
          <div
            class="settings-nav-mobile degoog-select-wrap degoog-select-wrap--mobile-only"
          >
            <select
              id="settings-tab-select"
              class="settings-tab-select degoog-select"
              aria-label="{{t:settings-page.nav.aria-section}}"
            >
              <option value="general">{{t:settings-page.nav.general}}</option>
              <option value="server">{{t:settings-page.nav.server}}</option>
              <option value="engines">{{t:settings-page.nav.engines}}</option>
              <option value="plugins">{{t:settings-page.nav.plugins}}</option>
              <option value="transports">{{t:settings-page.nav.transports}}</option>
              <option value="autocomplete">{{t:settings-page.nav.autocomplete}}</option>
              <option value="themes">{{t:settings-page.nav.themes}}</option>
              <option value="store">{{t:settings-page.nav.store}}</option>
            </select>
          </div>

          <nav
            class="settings-nav"
            id="settings-tabs-nav"
            aria-label="{{t:settings-page.nav.aria-sections}}"
          >
            <button class="settings-nav-item active" data-tab="general" type="button">
              <i class="fa-solid fa-gear fa-lg"></i>
              {{t:settings-page.nav.general}}
            </button>
            <button class="settings-nav-item" data-tab="server" type="button">
              <i class="fa-solid fa-server fa-lg"></i>
              {{t:settings-page.nav.server}}
            </button>
            <button
              class="settings-nav-item"
              data-tab="indexer"
              type="button"
              data-indexer-nav
              style="display: none"
            >
              <i class="fa-solid fa-database fa-lg"></i>
              {{t:settings-page.nav.indexer}}
            </button>
            <button class="settings-nav-item" data-tab="engines" type="button">
              <i class="fa-solid fa-bolt fa-lg"></i>
              {{t:settings-page.nav.engines}}
            </button>
            <button class="settings-nav-item" data-tab="plugins" type="button">
              <i class="fa-solid fa-puzzle-piece fa-lg"></i>
              {{t:settings-page.nav.plugins}}
            </button>
            <button class="settings-nav-item" data-tab="transports" type="button">
              <i class="fa-solid fa-network-wired fa-lg"></i>
              {{t:settings-page.nav.transports}}
            </button>
            <button class="settings-nav-item" data-tab="autocomplete" type="button">
              <i class="fa-solid fa-keyboard fa-lg"></i>
              {{t:settings-page.nav.autocomplete}}
            </button>
            <button class="settings-nav-item" data-tab="themes" type="button">
              <i class="fa-solid fa-palette fa-lg"></i>
              {{t:settings-page.nav.themes}}
            </button>
            <button class="settings-nav-item" data-tab="store" type="button">
              <i class="fa-solid fa-store fa-lg"></i>
              {{t:settings-page.nav.store}}
            </button>
          </nav>
        </div>

        <main class="settings-page-main">
          <div class="settings-tab-panel active" id="tab-general">
            <div id="general-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-engines">
            <div id="engines-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-plugins">
            <div id="plugins-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-transports">
            <div id="transports-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-autocomplete">
            <div id="autocomplete-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-themes">
            <div id="themes-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-server">
            <div id="server-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-store">
            <div id="store-content"></div>
          </div>
          <div class="settings-tab-panel" id="tab-indexer">
            <div id="indexer-content"></div>
          </div>
        </main>
      </div>
    </div>

    <div class="ext-modal-overlay" id="ext-modal-overlay" style="display: none">
      <div class="ext-modal" id="ext-modal" role="dialog" aria-modal="true">
        <div class="ext-modal-header">
          <h2 class="ext-modal-title" id="ext-modal-title"></h2>
          <button
            class="ext-modal-close degoog-icon-btn"
            id="ext-modal-close"
            type="button"
            aria-label="{{t:settings-page.modal.close-aria}}"
          >
            &times;
          </button>
        </div>
        <div class="ext-modal-body" id="ext-modal-body"></div>
        <div class="ext-modal-footer">
          <span class="ext-modal-status" id="ext-modal-status"></span>
          <button class="settings-save" id="ext-modal-save" type="button">
            {{t:settings-page.modal.save}}
          </button>
        </div>
      </div>
    </div>

    <script
      type="module"
      src="/public/settings-page.js?v=__APP_VERSION__"
    ></script>
  </body>
</html>
